<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>0613 · 夏以昼生日快乐</title>
<style>
  *{margin:0;padding:0;box-sizing:border-box}

  @font-face{
    font-family:'MaShanZheng';
    src:url('https://raw.githubusercontent.com/kay2331009/xiao-clock/main/fonts/MaShanZheng.ttf') format('truetype');
    font-weight:400;
    font-style:normal;
    unicode-range:U+4E00-9FFF,U+3000-303F,U+2000-206F;
  }

  body{
    background:#0a0705;
    min-height:100vh;
    display:flex;flex-direction:column;align-items:center;justify-content:center;
    font-family:'MaShanZheng','STKaiti','KaiTi',serif;
    color:#f5e6d0;overflow:hidden;
    font-weight:400;
  }

  body::before{
    content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
    background:
      radial-gradient(ellipse 70% 50% at 50% 38%,rgba(80,40,10,0.45) 0%,transparent 65%),
      radial-gradient(ellipse 90% 70% at 50% 50%,rgba(50,25,10,0.2) 0%,transparent 70%),
      radial-gradient(ellipse 100% 80% at 50% 50%,rgba(5,3,1,0.9) 0%,transparent 80%);
  }

  .container{
    text-align:center;position:relative;z-index:1;
    padding:40px;
    display:flex;flex-direction:column;align-items:center;gap:32px;
  }

  /* 苹果切片 */
  .apple-wrap{
    opacity:0;
    animation:appleReveal 2s ease 0.2s forwards;
  }
  @keyframes appleReveal{
    from{opacity:0;transform:translateY(20px) scale(0.85)}
    to{opacity:1;transform:translateY(0) scale(1)}
  }

  .apple-svg{
    width:clamp(90px,18vw,140px);height:auto;
    filter:drop-shadow(0 0 24px rgba(210,100,30,0.5));
  }

  .top-line{
    font-family:'STKaiti','KaiTi',serif;
    font-size:clamp(0.7rem,1.6vw,0.85rem);
    letter-spacing:0.6em;
    color:rgba(220,180,120,0.45);
    margin-bottom:6px;
    opacity:0;
    animation:fadeUp 1s ease 0.8s forwards;
  }

  .main-text{
    font-family:'MaShanZheng','STKaiti','KaiTi',serif;
    font-size:clamp(1.8rem,5vw,3.2rem);
    letter-spacing:0.18em;
    line-height:2.4;
    color:#f5e6d0;
  }

  .main-text .line{
    display:block;
    opacity:0;
    animation:fadeUp 1.2s ease forwards;
  }
  .main-text .line:nth-child(1){animation-delay:1s}
  .main-text .line:nth-child(2){animation-delay:1.6s}

  .divider{
    width:1px;height:36px;
    background:linear-gradient(to bottom,transparent,rgba(200,140,60,0.4),transparent);
    margin:0 auto;
    opacity:0;
    animation:fadeUp 1s ease 2s forwards;
  }

  .bottom-line{
    font-family:'STKaiti','KaiTi',serif;
    font-size:clamp(0.55rem,1.4vw,0.7rem);
    letter-spacing:0.45em;
    color:rgba(200,160,100,0.35);
    opacity:0;
    animation:fadeUp 1s ease 2.2s forwards;
  }

  @keyframes fadeUp{
    from{opacity:0;transform:translateY(16px)}
    to{opacity:1;transform:translateY(0)}
  }

  /* 角落装饰 */
  .corner{position:fixed;width:36px;height:36px;opacity:0.15;z-index:1}
  .corner-tl{top:20px;left:20px;border-top:1px solid rgba(200,130,50,0.8);border-left:1px solid rgba(200,130,50,0.8)}
  .corner-tr{top:20px;right:20px;border-top:1px solid rgba(200,130,50,0.8);border-right:1px solid rgba(200,130,50,0.8)}
  .corner-bl{bottom:20px;left:20px;border-bottom:1px solid rgba(200,130,50,0.8);border-left:1px solid rgba(200,130,50,0.8)}
  .corner-br{bottom:20px;right:20px;border-bottom:1px solid rgba(200,130,50,0.8);border-right:1px solid rgba(200,130,50,0.8)}

  .footer{
    position:fixed;bottom:18px;left:0;right:0;text-align:center;
    font-family:'STKaiti','KaiTi',serif;
    font-size:0.58rem;letter-spacing:0.4em;color:rgba(180,130,70,0.2);
    z-index:1;
  }

  /* 海面波纹 */
  .waves-wrap{
    position:fixed;bottom:0;left:0;right:0;height:120px;overflow:hidden;z-index:0;pointer-events:none;
    opacity:0;
    animation:wavesFadeIn 2s ease 2.5s forwards;
  }
  @keyframes wavesFadeIn{
    from{opacity:0}
    to{opacity:1}
  }
  .wave{
    position:absolute;bottom:0;left:-10%;width:120%;height:100%;
    background:transparent;
  }
  .wave svg{width:100%;height:100%}
  .wave path{
    fill:rgba(200,150,60,0.08);
    opacity:0.7;
  }
  .wave-1{animation:waveFloat 8s ease-in-out infinite;bottom:0}
  .wave-2{animation:waveFloat 10s ease-in-out infinite 1s;bottom:-8px;opacity:0.5}
  .wave-3{animation:waveFloat 12s ease-in-out infinite 2s;bottom:-16px;opacity:0.3}
  @keyframes waveFloat{
    0%,100%{transform:translateX(0)}
    50%{transform:translateX(-3%)}
  }

  /* 阳光反射碎片 */
  .sparkle-field{
    position:fixed;bottom:0;left:0;right:0;height:80px;overflow:hidden;z-index:0;pointer-events:none;
    opacity:0;
    animation:wavesFadeIn 2s ease 3s forwards;
  }
  .sparkle{
    position:absolute;width:3px;height:3px;border-radius:50%;
    background:rgba(255,220,120,0.6);
    animation:sparkleFloat 4s ease-in-out infinite;
  }
  @keyframes sparkleFloat{
    0%,100%{opacity:0;transform:translateY(0)}
    30%{opacity:0.8;transform:translateY(-20px)}
    60%{opacity:0.3;transform:translateY(-40px)}
  }
</style>
</head>
<body>

<div class="corner corner-tl"></div>
<div class="corner corner-tr"></div>
<div class="corner corner-bl"></div>
<div class="corner corner-br"></div>

<div class="container">

  <!-- 苹果切片 SVG（横切面，星形籽） -->
  <div class="apple-wrap">
    <svg class="apple-svg" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" fill="none">
      <!-- 外层光晕 -->
      <ellipse cx="100" cy="100" rx="88" ry="88" fill="rgba(210,90,20,0.06)" filter="blur(6px)"/>
      <!-- 果皮 -->
      <circle cx="100" cy="100" r="82" fill="rgba(210,90,20,0.18)"/>
      <circle cx="100" cy="100" r="76" fill="rgba(220,100,30,0.25)"/>
      <!-- 果肉 -->
      <circle cx="100" cy="100" r="70" fill="rgba(235,140,50,0.7)"/>
      <circle cx="100" cy="100" r="62" fill="rgba(240,155,60,0.8)"/>
      <!-- 果心纹理 -->
      <ellipse cx="100" cy="100" rx="40" ry="38" fill="rgba(225,130,45,0.35)"/>
      <!-- 星形籽（苹果核的星形排列） -->
      <!-- 中心 -->
      <ellipse cx="100" cy="100" rx="6" ry="6" fill="rgba(120,60,20,0.9)"/>
      <!-- 五角星方向分布的籽 -->
      <ellipse cx="100" cy="76" rx="5" ry="8" fill="rgba(110,55,18,0.85)" transform="rotate(0 100 100)"/>
      <ellipse cx="100" cy="124" rx="5" ry="8" fill="rgba(110,55,18,0.85)" transform="rotate(0 100 100)"/>
      <ellipse cx="76" cy="100" rx="8" ry="5" fill="rgba(110,55,18,0.85)" transform="rotate(0 100 100)"/>
      <ellipse cx="124" cy="100" rx="8" ry="5" fill="rgba(110,55,18,0.85)" transform="rotate(0 100 100)"/>
      <!-- 斜向四籽 -->
      <ellipse cx="82" cy="82" rx="5" ry="7" fill="rgba(110,55,18,0.8)" transform="rotate(45 82 82)"/>
      <ellipse cx="118" cy="82" rx="5" ry="7" fill="rgba(110,55,18,0.8)" transform="rotate(-45 118 82)"/>
      <ellipse cx="82" cy="118" rx="5" ry="7" fill="rgba(110,55,18,0.8)" transform="rotate(-45 82 118)"/>
      <ellipse cx="118" cy="118" rx="5" ry="7" fill="rgba(110,55,18,0.8)" transform="rotate(45 118 118)"/>
      <!-- 高光 -->
      <ellipse cx="78" cy="72" rx="18" ry="12" fill="rgba(255,220,160,0.12)" transform="rotate(-30 78 72)"/>
    </svg>
  </div>

  <div class="top-line">0613 · Xià Yǐ Zhòu · Happy Birthday</div>

  <div class="main-text">
    <span class="line">夏以昼，生日快乐，</span>
    <span class="line">愿你的每一天都盛满阳光。</span>
  </div>

  <div class="divider"></div>

  <div class="bottom-line">日光入海，水波金来</div>

</div>

<div class="footer">日光入海 · 水波金来</div>

<!-- 海面波纹 -->
<div class="waves-wrap">
  <div class="wave wave-1">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,60 C180,90 360,30 540,60 C720,90 900,30 1080,60 C1260,90 1440,30 1440,60 L1440,120 L0,120 Z"/>
    </svg>
  </div>
  <div class="wave wave-2">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,60 C200,30 400,90 600,60 C800,30 1000,90 1200,60 C1350,40 1440,55 1440,55 L1440,120 L0,120 Z"/>
    </svg>
  </div>
  <div class="wave wave-3">
    <svg viewBox="0 0 1440 120" preserveAspectRatio="none">
      <path d="M0,55 C150,85 300,25 480,55 C660,85 840,25 1020,55 C1200,85 1380,25 1440,50 L1440,120 L0,120 Z"/>
    </svg>
  </div>
</div>

<!-- 阳光反射碎片 -->
<div class="sparkle-field">
  <div class="sparkle" style="left:15%;animation-delay:0s"></div>
  <div class="sparkle" style="left:25%;animation-delay:0.8s"></div>
  <div class="sparkle" style="left:38%;animation-delay:1.6s"></div>
  <div class="sparkle" style="left:52%;animation-delay:0.4s"></div>
  <div class="sparkle" style="left:65%;animation-delay:1.2s"></div>
  <div class="sparkle" style="left:78%;animation-delay:2s"></div>
  <div class="sparkle" style="left:88%;animation-delay:0.6s"></div>
</div>

</body>
</html>
